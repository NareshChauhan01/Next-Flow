<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Flow</title>

  <!-- ===== CSS Files ===== -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

  <!-- ===== Header Start ===== -->
  <header class="header">
    <div class="container">
      <div class="header-content">

        <a href="#" class="logo">Next Flow</a>

        <div class="header-content-right ">

          <div class="nav-group">

            <nav class="navbar">
              <ul>
                <li><a href="#" class="nav-active">Home</a></li>
                <li><a href="#">Tools</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
              </ul>
            </nav>

            <div class="nav-buttons">
              <button class="btn btn-secondary">
                Login
              </button>

              <button class="btn btn-primary">
                Sign Up
              </button>
            </div>

          </div>

          <button class="hamburger" aria-label="Open Menu">
            <span></span>
            <span></span>
            <span></span>
          </button>


          <button class="theme-toggle">
            <img src="assets/icons/theme.png" alt="Theme Toggle" width="23" height="23">
          </button>

        </div>

      </div>
    </div>
  </header>
  <!-- ===== Header End ===== -->
   

  <!-- ===== Main Content Start ===== -->
  <main>

    <section class="hero">
      <div class="container">
        <div class="hero-content">

          <div class="hero-left">

            <p class="hero-badge">Productivity Made Simple</p>

            <h1>All your essential tools in one place</h1>

            <p class="hero-description">
              Access powerful and easy-to-use tools designed to simplify your everyday tasks.
              Everything you need is just one click away.
            </p>

            <div class="hero-buttons">
              <button class="btn btn-secondary">Get Started</button>
              <button class="btn btn-primary">Explore Tools</button>
            </div>

          </div>

          <div class="hero-right">
            <img src="assets/images/hero-illustration.png" alt="Productivity dashboard illustration">
          </div>

        </div>
      </div>
    </section>

  </main>
  <!-- ===== Main Content End ===== -->




  <div style="height: 200vh;"></div>
  <!-- ===== JS Files ===== -->
  <script src="js/main.js"></script>
</body>

</html>
